<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherCorp | Dashboard Climático</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="topbar">
        <h1>🌤️ TempoCerto</h1>

        <div class="search-area">
            <input type="text" id="cityInput" placeholder="Digite a cidade..." aria-label="Nome da cidade">
            <button id="searchBtn">Buscar</button>
        </div>
    </header>

    <!-- LOADER -->
    <div id="loader" class="loader" style="display: none;">
        Carregando dados...
    </div>

    <!-- ERRO -->
    <div id="errorMessage" class="error-message"></div>

    <!-- DASHBOARD -->
    <main class="dashboard">

        <!-- CLIMA ATUAL -->
        <section class="weather-main">
            <h2 id="cityName"></h2>
            <div id="welcomeMessage" class="welcome">
                ⛅ Bem-vindo ao TempoCerto!
                <br>
                Digite o nome de uma cidade para ver a previsão do tempo.
            </div>
            <p id="temperature"></p>
            <p id="humidity"></p>
            <p id="wind"></p>
        </section>

        <!-- PREVISÃO -->
        <section class="forecast">
            <h3>Previsão para 5 dias</h3>
            <div id="forecastContainer" class="forecast-grid"></div>
        </section>

        <!-- HISTÓRICO -->
        <aside class="history">
            <h3>Histórico de buscas</h3>
            <ul id="historyList"></ul>
        </aside>

    </main>

    <script src="script.js"></script>

</body>

</html>
